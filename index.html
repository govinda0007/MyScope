<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0c0e10">
<title>Lumacam</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  :root{
    --bg:#0c0e10;
    --panel:#15181b;
    --line:#262b2f;
    --ink:#f3f1ec;
    --dim:#8b9197;
    --amber:#ffb454;
    --amber-dim:#ffb45433;
    --rec:#ff4d4d;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none;}
  html,body{margin:0;padding:0;height:100%;background:var(--bg);overflow:hidden;
    font-family:-apple-system,'Segoe UI',Roboto,system-ui,sans-serif; color:var(--ink);
    letter-spacing:.01em;}

  #wrap{position:fixed;inset:0;display:flex;flex-direction:column;}

  /* ================= TOP BAR ================= */
  #topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:max(12px, env(safe-area-inset-top)) 16px 10px;
    z-index:30; position:relative;
    background:linear-gradient(to bottom, rgba(0,0,0,.45), transparent);
  }
  .iconbtn{
    width:42px;height:42px;border-radius:50%;
    background:rgba(21,24,27,.55); border:1px solid rgba(255,255,255,.08);
    backdrop-filter:blur(6px);
    display:flex;align-items:center;justify-content:center;
    color:var(--ink); font-size:18px; cursor:pointer; transition:.15s;
  }
  .iconbtn:active{transform:scale(.92); background:rgba(255,255,255,.12);}
  .iconbtn.active{color:var(--amber); border-color:var(--amber-dim); background:var(--amber-dim);}
  .iconbtn svg{width:20px;height:20px;}

  #timerLabel{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    font-size:13px; font-weight:600; letter-spacing:.08em; color:var(--dim);
    background:rgba(21,24,27,.55); border:1px solid rgba(255,255,255,.08);
    backdrop-filter:blur(6px); padding:8px 14px; border-radius:20px;
    display:none; align-items:center; gap:6px;
  }
  #timerLabel.show{display:flex;}
  #timerLabel.on{color:var(--amber);}

  /* ================= STAGE ================= */
  #stage{position:relative;flex:1;min-height:0;overflow:hidden;background:#000;}
  video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  canvas#shotCanvas{display:none;}

  /* grid overlay */
  #grid{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .2s;z-index:5;}
  #grid.show{opacity:.35;}
  #grid .line{position:absolute;background:rgba(255,255,255,.6);}
  #grid .v1{left:33.333%;top:0;bottom:0;width:1px;}
  #grid .v2{left:66.666%;top:0;bottom:0;width:1px;}
  #grid .h1{top:33.333%;left:0;right:0;height:1px;}
  #grid .h2{top:66.666%;left:0;right:0;height:1px;}

  /* focus ring on tap */
  .focus-ring{
    position:absolute; width:64px; height:64px; border:1.5px solid var(--amber);
    border-radius:50%; pointer-events:none; z-index:6;
    transform:translate(-50%,-50%) scale(1.4); opacity:0;
  }
  .focus-ring.show{ animation:focusPulse .6s ease-out; }
  @keyframes focusPulse{
    0%{opacity:1; transform:translate(-50%,-50%) scale(1.4);}
    60%{opacity:1; transform:translate(-50%,-50%) scale(1);}
    100%{opacity:0; transform:translate(-50%,-50%) scale(1);}
  }

  /* countdown overlay */
  #countdown{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    z-index:25; pointer-events:none; opacity:0;
  }
  #countdown.show{opacity:1;}
  #countdown span{
    font-size:96px; font-weight:200; color:#fff;
    text-shadow:0 0 30px rgba(255,180,84,.6);
    animation:countPulse .9s ease-out;
  }
  @keyframes countPulse{
    0%{transform:scale(1.6); opacity:0;}
    30%{transform:scale(1); opacity:1;}
    100%{transform:scale(1); opacity:0;}
  }

  /* flash effect */
  #flashFx{
    position:absolute; inset:0; background:#fff; opacity:0; z-index:40; pointer-events:none;
  }
  #flashFx.fire{ animation:flashFire .25s ease-out; }
  @keyframes flashFire{ 0%{opacity:.85;} 100%{opacity:0;} }

  /* recording indicator */
  #recIndicator{
    position:absolute; top:max(16px, env(safe-area-inset-top)); left:50%; transform:translateX(-50%);
    display:none; align-items:center; gap:8px; z-index:30;
    background:rgba(12,14,16,.6); border-radius:20px; padding:6px 14px;
    font-size:13px; font-weight:600; backdrop-filter:blur(6px);
    border:1px solid rgba(255,77,77,.3);
  }
  #recIndicator.show{display:flex;}
  #recIndicator .dot{width:9px;height:9px;border-radius:50%;background:var(--rec);animation:recBlink 1s infinite;}
  @keyframes recBlink{0%,100%{opacity:1}50%{opacity:.2}}

  /* mode label fade */
  #toast{
    position:absolute; bottom:160px; left:50%; transform:translateX(-50%);
    background:rgba(21,24,27,.85); color:var(--ink); padding:8px 16px; border-radius:18px;
    font-size:13px; font-weight:500; opacity:0; transition:opacity .25s; z-index:30;
    pointer-events:none; white-space:nowrap;
  }
  #toast.show{opacity:1;}

  /* ================= BOTTOM CONTROLS ================= */
  #bottombar{
    position:relative; z-index:30;
    padding:14px 0 max(20px, env(safe-area-inset-bottom));
    background:linear-gradient(to top, rgba(0,0,0,.5), transparent);
  }

  /* mode switcher */
  #modes{
    display:flex; justify-content:center; gap:28px; margin-bottom:18px;
    font-size:13px; font-weight:600; letter-spacing:.12em; text-transform:uppercase;
    color:var(--dim);
  }
  #modes .mode{ cursor:pointer; padding:4px 2px; position:relative; transition:.2s; }
  #modes .mode.active{ color:var(--amber); }
  #modes .mode.active::after{
    content:''; position:absolute; left:0; right:0; bottom:-6px; height:2px;
    background:var(--amber); border-radius:2px;
  }

  /* main control row */
  #controls{
    display:grid; grid-template-columns:1fr auto 1fr; align-items:center;
    padding:0 32px;
  }
  #galleryThumb{
    width:48px; height:48px; border-radius:12px; overflow:hidden;
    border:2px solid rgba(255,255,255,.15); background:var(--panel);
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    justify-self:start;
  }
  #galleryThumb img{width:100%;height:100%;object-fit:cover;}
  #galleryThumb svg{width:20px;height:20px;color:var(--dim);}

  /* shutter button */
  #shutterWrap{justify-self:center; position:relative;}
  #shutter{
    width:78px; height:78px; border-radius:50%;
    background:#fff; border:4px solid rgba(255,255,255,.25);
    cursor:pointer; transition:.15s; position:relative;
  }
  #shutter::after{
    content:''; position:absolute; inset:6px; border-radius:50%;
    border:2px solid var(--bg); transition:.2s;
  }
  #shutter:active{ transform:scale(.92); }
  #shutter.video-mode{ background:var(--rec); }
  #shutter.recording{ background:var(--rec); border-radius:16px; }
  #shutter.recording::after{ border-radius:10px; inset:14px; border-color:#fff; }

  #flipBtn{ justify-self:end; }

  /* ================= GALLERY ================= */
  #galleryView{
    position:fixed; inset:0; background:var(--bg); z-index:100;
    display:flex; flex-direction:column; transform:translateY(100%);
    transition:transform .3s ease; overflow:hidden;
  }
  #galleryView.open{ transform:translateY(0); }
  #galleryHeader{
    display:flex; align-items:center; justify-content:space-between;
    padding:max(16px, env(safe-area-inset-top)) 16px 14px;
    border-bottom:1px solid var(--line);
  }
  #galleryHeader h2{ font-size:17px; font-weight:700; margin:0; letter-spacing:.02em; }
  #galleryGrid{
    flex:1; overflow-y:auto; display:grid; grid-template-columns:repeat(3,1fr);
    gap:3px; padding:3px; -webkit-overflow-scrolling:touch;
  }
  .gallery-item{
    position:relative; aspect-ratio:1; background:var(--panel);
    overflow:hidden; cursor:pointer;
  }
  .gallery-item img, .gallery-item video{ width:100%; height:100%; object-fit:cover; }
  .gallery-item .badge{
    position:absolute; bottom:6px; right:6px; background:rgba(0,0,0,.6);
    border-radius:6px; padding:2px 6px; font-size:11px; display:flex; align-items:center; gap:4px;
  }
  .gallery-item .badge svg{width:12px;height:12px;}
  #galleryEmpty{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:var(--dim); gap:10px; text-align:center; padding:40px;
  }
  #galleryEmpty svg{width:48px;height:48px;opacity:.4;}
  #galleryEmpty.hidden, #galleryGrid.hidden{ display:none; }

  /* lightbox */
  #lightbox{
    position:fixed; inset:0; background:rgba(0,0,0,.96); z-index:110;
    display:none; align-items:center; justify-content:center; flex-direction:column;
  }
  #lightbox.open{ display:flex; }
  #lightbox img, #lightbox video{ max-width:100%; max-height:80vh; object-fit:contain; }
  #lightboxBar{
    position:absolute; top:max(16px, env(safe-area-inset-top)); left:0; right:0;
    display:flex; justify-content:space-between; padding:0 16px;
  }
  #lightboxBar .iconbtn{ background:rgba(21,24,27,.7); }

  .hidden{ display:none !important; }
</style>
</head>
<body>
<div id="wrap">

  <div id="stage">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="shotCanvas"></canvas>

    <div id="grid">
      <div class="line v1"></div><div class="line v2"></div>
      <div class="line h1"></div><div class="line h2"></div>
    </div>

    <div id="recIndicator"><span class="dot"></span><span id="recTime">00:00</span></div>

    <!-- top bar -->
    <div id="topbar">
      <div class="iconbtn" id="flashBtn" title="Flash">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11 21h-1l1-7H7.5c-.58 0-.57-.32-.38-.66.19-.34.05-.08.07-.12C8.48 10.94 10.42 7.54 13 3h1l-1 7h3.5c.49 0 .56.33.47.51l-.07.15C12.96 17.55 11 21 11 21z"/></svg>
      </div>
      <div class="iconbtn" id="gridBtn" title="Grid">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/></svg>
      </div>
      <div id="timerLabel"><span id="timerIcon">⏱</span><span id="timerVal">OFF</span></div>
      <div class="iconbtn" id="timerBtn" title="Timer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2"/><path d="M9 2h6"/></svg>
      </div>
      <div class="iconbtn" id="settingsBtn" title="Resolution">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </div>
    </div>

    <div class="focus-ring" id="focusRing"></div>
    <div id="countdown"><span id="countdownNum"></span></div>
    <div id="flashFx"></div>
    <div id="toast"></div>
  </div>

  <!-- bottom controls -->
  <div id="bottombar">
    <div id="modes">
      <div class="mode active" data-mode="photo">Photo</div>
      <div class="mode" data-mode="video">Video</div>
    </div>
    <div id="controls">
      <div id="galleryThumb">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
      </div>
      <div id="shutterWrap"><div id="shutter"></div></div>
      <div class="iconbtn" id="flipBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.13-3.36L23 10M1 14l5.36 4.36A9 9 0 0020.49 15"/></svg>
      </div>
    </div>
  </div>

  <!-- overlay for camera errors -->
  <div id="overlay" class="hidden" style="position:absolute;inset:0;background:rgba(12,14,16,.97);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;text-align:center;padding:24px;z-index:60;">
    <h2 style="font-size:16px;margin:0;">Camera access needed</h2>
    <p id="overlayMsg" style="font-size:13px;color:var(--dim);max-width:280px;line-height:1.6;margin:0;">Allow camera permission to start.</p>
    <button id="retryBtn" style="background:var(--amber);color:#1a1206;border:none;padding:12px 24px;border-radius:24px;font-weight:700;font-size:13px;cursor:pointer;">Retry</button>
  </div>

</div>

<!-- Gallery -->
<div id="galleryView">
  <div id="galleryHeader">
    <h2>Gallery</h2>
    <div class="iconbtn" id="closeGallery">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
  </div>
  <div id="galleryEmpty" class="hidden">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
    <div>No photos or videos yet</div>
  </div>
  <div id="galleryGrid" class="hidden"></div>
</div>

<!-- Lightbox -->
<div id="lightbox">
  <div id="lightboxBar">
    <div class="iconbtn" id="closeLightbox">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
    <div class="iconbtn" id="deleteBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
    </div>
  </div>
  <div id="lightboxContent"></div>
</div>

<script src="app.js"></script>
</body>
</html>
